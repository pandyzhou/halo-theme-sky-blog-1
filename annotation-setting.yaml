      value-only: true

---
# 标签图标配置
apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: theme-sky-blog-tag-icon
spec:
  targetRef:
    group: content.halo.run
    kind: Tag
  formSchema:
    - $formkit: "iconify"
