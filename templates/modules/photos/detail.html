<!-- ========================================== -->
<!--        图库照片详情页                       -->
<!-- 使用 plugin-photos v2.1 的 photo/detail 模型 -->
<!-- ========================================== -->
<th:block th:fragment="content">
  <th:block
    th:if="${photo != null}"
    th:with="
    cfg=${theme.config.photos_settings},
    showDownloadBtn=${cfg?.show_download_btn != false},
    photoTitle=${photo.spec.displayName ?: (title ?: '照片')},
    photoDesc=${photo.spec.description},
    hasTags=${photo.spec.tags != null and !#lists.isEmpty(photo.spec.tags)},
    exif=${photo.exif},
    hasCamera=${exif != null and (!#strings.isEmpty(exif.make) or !#strings.isEmpty(exif.model))},
    hasLens=${exif != null and !#strings.isEmpty(exif.lensModel)},
    hasExifFields=${exif != null and (hasCamera or hasLens or exif.fNumber != null or !#strings.isEmpty(exif.exposureTime) or exif.iso != null or exif.focalLength != null or exif.dateTimeOriginal != null or (exif.imageWidth != null and exif.imageHeight != null))}
  "
  >
    <main class="photo-detail-page mx-auto max-w-[90rem] px-4 py-6 md:px-8 md:py-8">
      <!-- 顶部导航：返回与上下文 -->
      <div class="photo-detail-toolbar mb-6 flex items-center justify-between gap-4">
        <a
          th:href="${backUrl ?: '/photos'}"
          class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content pl-0 transition-colors hover:bg-transparent"
        >
          <span class="icon-[heroicons--chevron-left] size-5"></span>
          返回图库
        </a>

        <div class="text-base-content/50 text-sm tabular-nums" th:if="${position != null and total != null}">
          <span th:text="${position}">1</span>
          <span class="mx-1 opacity-50">/</span>
          <span th:text="${total}">1</span>
        </div>
      </div>

      <div class="photo-detail-layout grid gap-8 lg:grid-cols-[minmax(0,1fr)_22rem] xl:grid-cols-[minmax(0,1fr)_24rem]">
        <!-- 左侧：照片舞台 -->
        <section class="photo-detail-viewer group relative">
          <a
            th:if="${photoUrl != null and prev != null}"
            th:href="${photoUrl.detail(prev)}"
            class="btn btn-circle btn-sm md:btn-md border-base-content/10 bg-base-100/70 text-base-content hover:bg-base-100 absolute top-1/2 left-3 z-10 -translate-y-1/2 opacity-100 shadow-sm backdrop-blur transition-all hover:scale-105 md:left-5 md:opacity-0 md:group-hover:opacity-100"
            aria-label="上一张"
          >
            <span class="icon-[heroicons--chevron-left] size-5"></span>
          </a>

          <img th:src="${photo.spec.url}" th:alt="${photoTitle}" class="photo-detail-image" loading="eager" />

          <a
            th:if="${photoUrl != null and next != null}"
            th:href="${photoUrl.detail(next)}"
            class="btn btn-circle btn-sm md:btn-md border-base-content/10 bg-base-100/70 text-base-content hover:bg-base-100 absolute top-1/2 right-3 z-10 -translate-y-1/2 opacity-100 shadow-sm backdrop-blur transition-all hover:scale-105 md:right-5 md:opacity-0 md:group-hover:opacity-100"
            aria-label="下一张"
          >
            <span class="icon-[heroicons--chevron-right] size-5"></span>
          </a>
        </section>

        <!-- 右侧：策展信息面板 -->
        <aside class="photo-detail-panel">
          <section>
            <p class="text-base-content/35 mb-3 text-[11px] font-bold tracking-[0.26em] uppercase">Photo</p>
            <h1
              class="photo-detail-title text-base-content mb-3 line-clamp-2 text-2xl leading-tight font-extrabold tracking-tight md:text-3xl"
              th:title="${photoTitle}"
              th:text="${photoTitle}"
            >
              照片标题
            </h1>
            <p
              class="text-base-content/70 text-sm leading-relaxed"
              th:if="${!#strings.isEmpty(photoDesc)}"
              th:text="${photoDesc}"
            >
              照片描述
            </p>
          </section>

          <section class="flex flex-wrap gap-2" th:if="${hasTags}">
            <span
              th:each="tag : ${photo.spec.tags}"
              th:text="${tag}"
              class="badge badge-sm badge-outline border-base-content/20 text-base-content/80 hover:bg-base-content/5 cursor-default px-3 py-3 transition-colors"
            >
              标签
            </span>
          </section>

          <section class="grid gap-3">
            <a
              th:href="${photo.spec.url}"
              target="_blank"
              rel="noopener"
              class="btn btn-neutral h-11 w-full gap-2 rounded-xl"
            >
              <span class="icon-[heroicons--arrow-top-right-on-square] size-4"></span>
              查看原图
            </a>
            <a
              th:if="${showDownloadBtn}"
              th:href="${photo.spec.url}"
              download
              class="photo-detail-secondary-action border-base-content/10 bg-base-content/5 text-base-content/60 hover:border-base-content/15 hover:bg-base-content/10 hover:text-base-content flex h-10 w-full items-center justify-center gap-2 rounded-xl border text-sm font-semibold shadow-none transition-colors"
            >
              <span class="icon-[heroicons--arrow-down-tray] size-4"></span>
              下载原图
            </a>
          </section>

          <!-- EXIF 信息区 -->
          <section th:if="${hasExifFields}">
            <h2 class="text-base-content mb-4 flex items-center gap-2 text-sm font-semibold">
              <span class="icon-[heroicons--camera] text-base-content/70 size-4"></span>
              拍摄参数
            </h2>

            <div class="photo-detail-meta-card">
              <div class="photo-detail-meta-item" th:if="${hasCamera}">
                <span>Camera</span>
                <strong
                  th:title="${(exif.make ?: '') + ' ' + (exif.model ?: '')}"
                  th:text="${(exif.make ?: '') + ' ' + (exif.model ?: '')}"
                >
                  Camera
                </strong>
              </div>

              <div class="photo-detail-meta-item" th:if="${hasLens}">
                <span>Lens</span>
                <strong th:title="${exif.lensModel}" th:text="${exif.lensModel}">Lens</strong>
              </div>

              <div class="photo-detail-meta-item" th:if="${exif.fNumber != null}">
                <span>Aperture</span>
                <strong th:text="${'f/' + exif.fNumber}">f/1.8</strong>
              </div>

              <div class="photo-detail-meta-item" th:if="${!#strings.isEmpty(exif.exposureTime)}">
                <span>Shutter</span>
                <strong th:text="${exif.exposureTime}">1/100</strong>
              </div>

              <div class="photo-detail-meta-item" th:if="${exif.iso != null}">
                <span>ISO</span>
                <strong th:text="${exif.iso}">100</strong>
              </div>

              <div class="photo-detail-meta-item" th:if="${exif.focalLength != null}">
                <span>Focal Length</span>
                <strong th:text="${exif.focalLength + 'mm'}">35mm</strong>
              </div>

              <div class="photo-detail-meta-item col-span-2" th:if="${exif.dateTimeOriginal != null}">
                <span>Date</span>
                <strong th:text="${exif.dateTimeOriginal}">2026-05-12</strong>
              </div>

              <div
                class="photo-detail-meta-item col-span-2"
                th:if="${exif.imageWidth != null and exif.imageHeight != null}"
              >
                <span>Size</span>
                <strong th:text="${exif.imageWidth + ' × ' + exif.imageHeight}">4000 × 3000</strong>
              </div>
            </div>
          </section>

          <!-- 附近照片 -->
          <section th:if="${photoUrl != null and neighbors != null and !#lists.isEmpty(neighbors)}">
            <h2 class="text-base-content mb-4 text-sm font-semibold">附近探索</h2>
            <div class="grid grid-cols-3 gap-3">
              <a
                th:each="neighbor : ${neighbors}"
                th:href="${photoUrl.detail(neighbor)}"
                class="group/neighbor border-base-content/5 hover:border-base-content/30 bg-base-200 block aspect-square overflow-hidden rounded-xl border transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md"
                th:classappend="${neighbor.metadata.name == photo.metadata.name} ? ' ring-2 ring-base-content/25' : ''"
              >
                <img
                  th:src="${neighbor.spec.cover ?: neighbor.spec.url}"
                  th:alt="${neighbor.spec.displayName ?: '照片'}"
                  class="h-full w-full object-cover transition-transform duration-500 group-hover/neighbor:scale-110"
                  loading="lazy"
                />
              </a>
            </div>
          </section>
        </aside>
      </div>
    </main>
  </th:block>

  <div th:if="${photo == null}" class="mx-auto max-w-4xl px-4 py-20 text-center">
    <span class="icon-[mdi--image-off-outline] text-base-content/30 mx-auto mb-4 h-16 w-16"></span>
    <p class="text-base-content/50 text-lg">照片不存在</p>
    <a href="/photos" class="btn btn-neutral btn-sm mt-4">返回图库</a>
  </div>
</th:block>
