<th:block th:fragment="docs(context)">
  <!-- 兼容基线：plugin-docsme v1.7.0；Finder >=1.4.0；0 篇文档项目不生成详情链接。 -->
  <th:block th:with="docsSettings = ${theme.config.index.docs_settings}">
    <section
      th:if="${docsSettings != null and docsSettings.enable_docs == true}"
      class="card bg-base-100/80 border-base-content/5 mb-8 rounded-[1.5rem] border p-5 shadow-lg backdrop-blur-xl sm:p-6 lg:mb-0"
    >
      <div class="mb-5 flex items-center justify-between px-1">
        <div class="flex items-center gap-3">
          <div
            class="from-primary/20 to-secondary/10 flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br"
          >
            <span class="icon-[heroicons--book-open] text-primary h-4 w-4"></span>
          </div>
          <div>
            <h2
              class="text-base-content text-lg font-bold tracking-tight select-none"
              th:text="${docsSettings?.docs_title} ?: '文档中心'"
            >
              文档中心
            </h2>
            <p
              class="text-base-content/40 mt-0.5 text-xs font-medium"
              th:text="${docsSettings?.docs_subtitle} ?: 'Documentation'"
            >
              Documentation
            </p>
          </div>
        </div>
        <a
          href="/docs"
          class="group text-base-content/50 hover:text-primary inline-flex items-center gap-1.5 text-xs font-semibold transition-colors duration-300"
        >
          View All
          <span
            class="icon-[heroicons--arrow-right] h-3 w-3 transition-transform duration-300 group-hover:translate-x-1"
          ></span>
        </a>
      </div>

      <th:block th:unless="${pluginFinder.available('plugin-docsme', '>=1.4.0')}">
        <div class="bg-base-100/50 border-base-content/5 rounded-2xl border border-dashed py-8 text-center">
          <p class="text-base-content/60 mb-1 text-sm">需要安装或升级 Docsme 插件 (≥1.4.0)</p>
          <p class="text-base-content/40 mb-3 text-xs">当前主题按 Docsme 1.7.0 适配；首页模块最低需要 Finder >=1.4.0</p>
          <a
            href="https://www.halo.run/store/apps/app-yffxw"
            target="_blank"
            rel="noopener noreferrer"
            class="bg-primary/10 text-primary hover:bg-primary/20 inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-xs font-medium transition-colors"
          >
            <span class="icon-[material-symbols--download] h-3.5 w-3.5"></span> 获取 Docsme
          </a>
        </div>
      </th:block>

      <th:block th:if="${pluginFinder.available('plugin-docsme', '>=1.4.0')}">
        <th:block th:with="result = ${docsmeProjectsFinder.list(1, docsSettings.docs_count ?: 5)}">
          <div
            th:if="${result != null and result.items != null and !result.items.isEmpty()}"
            class="border-base-content/[0.04] bg-base-100/30 divide-base-content/[0.04] flex flex-col divide-y overflow-hidden rounded-xl border"
          >
            <th:block th:each="project : ${result.items}" th:with="docCount = ${project.status.totalDocs ?: 0}">
              <a
                th:if="${docCount > 0}"
                th:href="${project.status.permalink}"
                class="group hover:bg-primary/[0.03] flex items-center justify-between px-4 py-3 transition-colors duration-200 sm:py-3.5"
              >
                <div class="flex min-w-0 flex-1 items-center gap-3.5 sm:gap-4">
                  <!-- 小图标 -->
                  <div
                    class="from-primary/10 to-secondary/10 ring-base-content/5 group-hover:ring-primary/20 relative flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-lg bg-gradient-to-br ring-1 transition-all duration-300 group-hover:scale-105 sm:h-9 sm:w-9 sm:rounded-xl"
                  >
                    <img
                      th:if="${project.spec.icon != null and !project.spec.icon.isEmpty()}"
                      th:src="${project.spec.icon}"
                      th:alt="${project.spec.displayName}"
                      class="h-4 w-4 object-contain sm:h-5 sm:w-5"
                      loading="lazy"
                    />
                    <span
                      th:if="${project.spec.icon == null or project.spec.icon.isEmpty()}"
                      class="icon-[heroicons--book-open] text-primary/60 group-hover:text-primary h-4 w-4 transition-colors sm:h-5 sm:w-5"
                    ></span>

                    <span
                      th:if="${project.spec.authorizeRequired}"
                      class="bg-error/10 ring-error/20 absolute -top-1 -right-1 flex h-3.5 w-3.5 items-center justify-center rounded-full ring-1 backdrop-blur-sm"
                    >
                      <span class="icon-[heroicons--lock-closed] text-error/80 h-2 w-2"></span>
                    </span>
                  </div>

                  <!-- 名字与一句话描述同行 (侧边排布) -->
                  <div class="flex min-w-0 flex-1 flex-col pr-4 sm:flex-row sm:items-center sm:gap-3">
                    <span
                      class="text-base-content group-hover:text-primary truncate text-sm font-semibold transition-colors"
                      th:text="${project.spec.displayName}"
                      >项目名</span
                    >
                    <span
                      class="text-base-content/40 hidden max-w-[200px] truncate text-[11px] sm:block sm:text-xs lg:max-w-xs xl:max-w-md"
                      th:text="${project.spec.description ?: '暂无相关描述'}"
                      >描述</span
                    >
                  </div>
                </div>

                <!-- 尾部状态与动作 -->
                <div class="flex flex-shrink-0 items-center gap-4">
                  <span
                    class="text-base-content/40 bg-base-content/5 hidden items-center gap-1 rounded-md px-2.5 py-1 font-mono text-[10px] sm:flex"
                  >
                    <span class="icon-[heroicons--document-text] h-3 w-3"></span>
                    <span th:text="${docCount}">0</span>
                  </span>
                  <span
                    class="icon-[heroicons--chevron-right] text-base-content/20 group-hover:text-primary h-4 w-4 transition-all group-hover:translate-x-0.5"
                  ></span>
                </div>
              </a>

              <div
                th:unless="${docCount > 0}"
                aria-disabled="true"
                class="flex cursor-not-allowed items-center justify-between px-4 py-3 opacity-60 sm:py-3.5"
              >
                <div class="flex min-w-0 flex-1 items-center gap-3.5 sm:gap-4">
                  <div
                    class="bg-base-content/5 ring-base-content/5 relative flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-lg ring-1 sm:h-9 sm:w-9 sm:rounded-xl"
                  >
                    <img
                      th:if="${project.spec.icon != null and !project.spec.icon.isEmpty()}"
                      th:src="${project.spec.icon}"
                      th:alt="${project.spec.displayName}"
                      class="h-4 w-4 object-contain grayscale sm:h-5 sm:w-5"
                      loading="lazy"
                    />
                    <span
                      th:if="${project.spec.icon == null or project.spec.icon.isEmpty()}"
                      class="icon-[heroicons--book-open] text-base-content/30 h-4 w-4 sm:h-5 sm:w-5"
                    ></span>
                  </div>

                  <div class="flex min-w-0 flex-1 flex-col pr-4 sm:flex-row sm:items-center sm:gap-3">
                    <span class="text-base-content truncate text-sm font-semibold" th:text="${project.spec.displayName}"
                      >项目名</span
                    >
                    <span class="text-base-content/40 hidden max-w-[200px] truncate text-[11px] sm:block sm:text-xs"
                      >暂无文档</span
                    >
                  </div>
                </div>

                <div class="flex flex-shrink-0 items-center gap-4">
                  <span
                    class="text-base-content/40 bg-base-content/5 hidden items-center gap-1 rounded-md px-2.5 py-1 font-mono text-[10px] sm:flex"
                  >
                    <span class="icon-[heroicons--document-text] h-3 w-3"></span>
                    <span>0</span>
                  </span>
                  <span class="icon-[heroicons--lock-closed] text-base-content/20 h-4 w-4"></span>
                </div>
              </div>
            </th:block>
          </div>

          <!-- 空状态 -->
          <div th:if="${result == null or result.items == null or result.items.isEmpty()}" class="py-10 text-center">
            <span class="icon-[heroicons--book-open] text-base-content/20 mx-auto mb-3 block h-8 w-8"></span>
            <p class="text-base-content/40 text-xs font-medium">暂无文档项目，准备大作中</p>
          </div>
        </th:block>
      </th:block>
    </section>
  </th:block>
</th:block>
